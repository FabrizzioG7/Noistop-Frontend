<div class="page-container">
  <div class="page-header">
    <div>
      <h2>
        <mat-icon>bar_chart</mat-icon>
        Usuario Más Activo
      </h2>
      <p class="subtitle">Ranking de usuarios según cantidad de reportes registrados</p>
    </div>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="(topReportadores$ | async) ?? []">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Usuario</th>
        <td mat-cell *matCellDef="let element">
          <span class="usuario-chip">{{ element.nombre }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="cantidadReportes">
        <th mat-header-cell *matHeaderCellDef>Cantidad de Reportes</th>
        <td mat-cell *matCellDef="let element">
          <div class="reportes-count">{{ element.cantidadReportes }}</div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
