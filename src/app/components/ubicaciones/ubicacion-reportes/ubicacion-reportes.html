<div class="page-container">
  <div class="page-header">
    <div>
      <h2>
        <mat-icon>bar_chart</mat-icon>
        Ranking de Distritos
      </h2>
      <p class="subtitle">
        Top distritos con mayor cantidad de reportes
      </p>
    </div>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="(topDistritos$ | async) ?? []">
      <ng-container matColumnDef="distrito">
        <th mat-header-cell *matHeaderCellDef> Distrito </th>
        <td mat-cell *matCellDef="let element">
          <span class="distrito-chip">{{ element.distrito }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="cantidadReportes">
        <th mat-header-cell *matHeaderCellDef> Cantidad de Reportes </th>
        <td mat-cell *matCellDef="let element">
          <div class="reportes-count">{{ element.cantidadReportes }}</div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
