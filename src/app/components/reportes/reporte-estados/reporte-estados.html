<div class="page-container">
  <div class="page-header">
    <div>
      <h2>
        <mat-icon>bar_chart</mat-icon>
        Reportes por estado
      </h2>
      <p class="subtitle">Cantidad de reportes agrupados según su estado actual</p>
    </div>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="(conteoEstados$ | async) ?? []">
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let element">
          <span class="estado-chip">{{ element.estado }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="cantidad">
        <th mat-header-cell *matHeaderCellDef>Cantidad</th>
        <td mat-cell *matCellDef="let element">
          <div class="reportes-count">{{ element.cantidad }}</div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
